    .listItem { border-bottom: 1px solid #e2e8f0; padding: 10px 0; line-height: 1.35; }

":["A"]},{"id":"2.05","chapter":2,"chapterName":"Mechanika I","text":"Dítě o hmotnosti 20 kg houpající se na houpačce působí na závěsy houpačky silou (hmotnost houpačky zanedbáváme):","options":["trvale větší než 200 N","trvale menší než 200 N","oscilující kolem 200 N, střídavě větší a menší v závislosti na poloze houpačky","s konstantní velikostí 200 N"],"correct":["C"]},{"id":"2.06","chapter":2,"chapterName":"Mechanika I","text":"Dítě o hmotnosti 20 kg působí na závěsy houpačky v klidu tíhovou silou přibližně (hmotnost houpačky zanedbáváme):","options":["200 J","2000 J","20 N","200 N"],"correct":["D"]},{"id":"2.07","chapter":2,"chapterName":"Mechanika I","text":"Druhý Newtonův zákon lze vyjádřit výrokem:","options":["každé těleso setrvává v klidu nebo v rovnoměrném přímočarém pohybu jen potud, pokud je působící síly nepřinutí změnit jeho stav","časová změna hybnosti je úměrná působící síle","součin velikosti hmotnosti hmotného bodu a jeho rychlosti se numericky rovná působící síle","akce se rovná reakci"],"correct":["B"]},{"id":"2.08","chapter":2,"chapterName":"Mechanika I","text":"Dva hmotné body o různě velké hmotnosti na sebe působí gravitačními silami:","options":["které jsou stejně veliké, téhož směru a orientace","které jsou stejně veliké, ale opačného směru","které mají opačný směr a jejich velikosti jsou v poměru jejich hmotností (na hmotný bod o větší hmotnosti působí větší síla)","které mají opačný směr a jejich velikosti jsou v obráceném poměru jejich hmotností (na hmotný bod o větší hmotnosti působí menší síla)"],"correct":["B"]},{"id":"2.09","chapter":2,"chapterName":"Mechanika I","text":"Dvě duté koule (dutiny jsou kulové a umístěné ve středu), železnou a olověnou, stejného vnějšího poloměru i hmotnosti, držíme na nakloněné rovině. Vyberte odpověd’ včetně správného komentáře na otázku: Která koule se za kratší dobu skutálí, vypustíme-li je obě současně s nulovou počáteční rychlostí, když se valí bez prokluzování a deformace koulí zanedbáváme?","options":["železná koule, nebot’ má větší moment setrvačnosti, a tedy bude získávat při kutálení větší obvodovou rychlost","železná koule, nebot’ má menší moment setrvačnosti, a tedy bude získávat při kutálení větší obvodovou rychlost","olověná koule, nebot’ má menší moment setrvačnosti, a tedy bude získávat při kutálení větší obvodovou rychlost","olověná koule, nebot’ má větší moment setrvačnosti, a tedy bude získávat při kutálení větší obvodovou rychlost"],"correct":["B"]},{"id":"2.10","chapter":2,"chapterName":"Mechanika I","text":"Dvě tělesa A a B jsou na začátku pokusu v klidu ve stejné výšce. Těleso A začne padat volným pádem a těleso B je ve stejném okamžiku vystřeleno ve vodorovném směru. Jaký pohyb koná těleso A vzhledem k tělesu B, zanedbáme-li odpor vzduchu a zakřivení Země?","options":["pohyb rovnoměrně zrychlený směrem dolů","pohyb rovnoměrný přímočarý ve vodorovném směru","pohyb rovnoměrný dolů","pohyb rovnoměrně zrychlený šikmo dolů"],"correct":["B"]},{"id":"2.11","chapter":2,"chapterName":"Mechanika I","text":"Dvě tělesa A a B jsou na začátku pokusu v klidu ve stejné výšce. Těleso A začne padat volným pádem a těleso B je ve stejném okamžiku vystřeleno vodorovným směrem k tělesu A. Zanedbáváme odpor vzduchu a zakřivení Země. Může dojít ke srážce obou těles?","options":["ne, v žádném případě","ano, vždy, pokud je pokus prováděn v dostatečné výšce; jinak by tělesa dopadla na zem ve stejném okamžiku ještě před srážkou","ano, ale pouze v případě, že obě tělesa mají stejnou hmotnost","ano, ale pouze v případě, že tělesu B je vystřelením udělena kinetická energie, která se přesně rovná jeho původní potenciální energii"],"correct":["B"]},{"id":"2.12","chapter":2,"chapterName":"Mechanika I","text":"Eskalátor se pohybuje vzhledem k zemi rychlostí 1,5 m/s a cestující po něm kráčí ve směru pohybu rychlostí 3,6 km/h. Výsledná rychlost cestujícího vzhledem k zemi je:","options":["5, 1 km/h","2, 5 m/s","9 km/h","6, 4 m/s"],"correct":["B","C"]},{"id":"2.13","chapter":2,"chapterName":"Mechanika I","text":"Hodnotu tíhového zrychlení na Zemi nahrazujeme přibližnou hodnotou:","options":["1 m/s2","10 m/s","10 m/s2","1 m/s−1"],"correct":["C"]},{"id":"2.14","chapter":2,"chapterName":"Mechanika I","text":"Inerciální vztažná soustava je:","options":["soustava, ve které neplatí zákon setrvačnosti, ale platí zákon síly","soustava, vzhledem ke které se izolovaný hmotný bod (tj. bod, na který nepůsobí žádná vnější síla) pohybuje rovnoměrně přímočaře nebo je v klidu","soustava, vzhledem ke které se izolovaný hmotný bod pohybuje rovnoměrně zrychleně","každá soustava pevně spojená se Zemí"],"correct":["B"]},{"id":"2.15","chapter":2,"chapterName":"Mechanika I","text":"Izolovaný hmotný bod je:","options":["hmotný bod, který je odolný vůči působení elektrického pole","hmotný bod, který je obklopen dielektrikem","hmotný bod v homogenním gravitačním poli","hmotný bod, na který nepůsobí žádné silové pole, tj. který nijak fyzikálně neinteraguje se svým okolím"],"correct":["D"]},{"id":"2.16","chapter":2,"chapterName":"Mechanika I","text":"Jak se změní gravitační síla, kterou se přitahují dva hmotné body, zmenší-li se jejich vzdálenost na 1/2 původní vzdálenosti?","options":["zmenší se 2×","zvětší se 2×","zmenší se 4×","zvětší se 4×"],"correct":["D"]},{"id":"2.17","chapter":2,"chapterName":"Mechanika I","text":"Jak se změní gravitační síla, kterou se přitahují dva hmotné body, zmenší-li se jejich vzdálenost na 1/4 původní vzdálenosti?","options":["zvětší se 4×","zvětší se 2×","zvětší se 8×","zvětší se 16×"],"correct":["D"]},{"id":"2.18","chapter":2,"chapterName":"Mechanika I","text":"Jakým způsobem závisí dráha na zrychlení při rovnoměrně zrychleném pohybu s nulovou počáteční rychlostí?","options":["druhá mocnina dráhy je přímo úměrná velikosti zrychlení","dráha je přímo úměrná druhé mocnině velikosti zrychlení","dráha je nepřímo úměrná velikosti zrychlení","dráha je přímo úměrná velikosti zrychlení"],"correct":["D"]},{"id":"2.19","chapter":2,"chapterName":"Mechanika I","text":"Je-li F síla působící rovnoměrně kolmo na plochu S, pak tlak p, který je touto silou vyvolaný, vyjádříme jako:","options":["p = F / S","p = F / S 2","p = S / F","p = F · S"],"correct":["A"]},{"id":"2.20","chapter":2,"chapterName":"Mechanika I","text":"Je-li výslednicí všech sil působících na těleso, které bylo na začátku v klidu, stálá nenulová síla:","options":["bude se těleso pohybovat rovnoměrně zrychleným pohybem ve směru působící síly","bude se zvyšovat kinetická energie tělesa","bude se těleso pohybovat rovnoměrně přímočaře ve směru působící síly","bude kinetická energie tělesa konstantní"],"correct":["A","B"]},{"id":"2.21","chapter":2,"chapterName":"Mechanika I","text":"Jednotka N · m−1 přísluší veličině:","options":["momentu síly vzhledem k ose otáčení","povrchovému napětí kapaliny","mechanické práci","impulsu síly"],"correct":["B"]},{"id":"2.22","chapter":2,"chapterName":"Mechanika I","text":"Jednotka N · s přísluší veličině:","options":["energii","momentu síly","impulsu síly","momentu setrvačnosti"],"correct":["C"]},{"id":"2.23","chapter":2,"chapterName":"Mechanika I","text":"Jednotka newton je vyjádřena v základních jednotkách soustavy SI takto:","options":["kg · m2 · s−1","kg · s2 · m−2","kg · m · s−2","kg · s2 · m−1"],"correct":["C"]},{"id":"2.24","chapter":2,"chapterName":"Mechanika I","text":"Jednotkou síly je:","options":["joule","pascal","watt","newton"],"correct":["D"]},{"id":"2.25","chapter":2,"chapterName":"Mechanika I","text":"Jestliže na těleso o hmotnosti m působí síla F, pak zrychlení tělesa:","options":["je tím větší, čím větší je působící síla F","je tím větší, čím větší je hmotnost tělesa m","nezávisí na hmotnosti tělesa","nezávisí na působící síle"],"correct":["A"]},{"id":"2.26","chapter":2,"chapterName":"Mechanika I","text":"Jestliže při pohybu po kružnici při konstantní úhlové rychlosti zvětšíme poloměr, pak obvodová (dráhová) rychlost v závislosti na poloměru:","options":["kvadraticky vzroste","lineárně vzroste","sníží se","zůstane konstantní"],"correct":["B"]},{"id":"2.27","chapter":2,"chapterName":"Mechanika I","text":"Kinetická energie je:","options":["vektorová veličina, jejíž směr je totožný se směrem rychlosti; jednotkou je 1 J","vektorová veličina, jejíž směr je totožný se směrem rychlosti; jednotkou je 1 W","skalární veličina; jednotkou je 1 J","skalární veličina; jednotkou je 1 W"],"correct":["C"]},{"id":"2.28","chapter":2,"chapterName":"Mechanika I","text":"Kinetickou energii Ek tuhého tělesa, které se otáčí rovnoměrně kolem nehybné osy, lze vyjádřit vztahem (J – moment setrvačnosti tělesa, ω – úhlová rychlost, v – obvodová rychlost):","options":["Ek = J · v2 / 2","Ek = J · ω2 / 2","Ek = J · (ω / 2)4","Ek = J · ω4"],"correct":["B"]},{"id":"2.29","chapter":2,"chapterName":"Mechanika I","text":"Které z uvedených vztahů pro rovnoměrný pohyb hmotného bodu po kružnici jsou správné? (v – obvodová rychlost, ω – úhlová rychlost, f – frekvence, T – perioda, r – poloměr kružnice)","options":["v = 2π · r","v = ω · f","ω = 2π · f","v = 2π · r · f"],"correct":["C","D"]},{"id":"2.30","chapter":2,"chapterName":"Mechanika I","text":"Moment síly má jednotku:","options":["kg · m · s−2","kg · m","J · m","N · m"],"correct":["D"]},{"id":"2.31","chapter":2,"chapterName":"Mechanika I","text":"Na hmotnou částici, která je držena v klidu, působí homogenní gravitační pole. Po uvolnění částice se:","options":["částice začne pohybovat rovnoměrně zrychleně","částice začne pohybovat přímočaře ve směru gravitačního zrychlení","kinetická energie částice v závislosti na čase bude kvadraticky zvyšovat","potenciální energie částice v gravitačním poli bude v závislosti na čase kvadraticky snižovat"],"correct":["A","B","C","D"]},{"id":"2.32","chapter":2,"chapterName":"Mechanika I","text":"Nepravdivé tvrzení je:","options":["hmotnost je skalár","velikost rychlosti je vektor","velikost rychlosti je skalár","zrychlení je vektor"],"correct":["B"]},{"id":"2.33","chapter":2,"chapterName":"Mechanika I","text":"Nepůsobí-li na těleso žádná vnější síla:","options":["bude těleso vždy v klidu","bude se těleso pohybovat rovnoměrně zpomaleným pohybem","bude se těleso pohybovat rovnoměrným pohybem nebo bude v klidu","bude pohyb tělesa nepředvídatelný"],"correct":["C"]},{"id":"2.34","chapter":2,"chapterName":"Mechanika I","text":"O fyzikálních veličinách platí:","options":["práce je vektorová veličina","síla je skalární veličina","energie je skalární veličina","tlak je vektorová veličina"],"correct":["C"]},{"id":"2.35","chapter":2,"chapterName":"Mechanika I","text":"Plavec plave v klidné vodě obvyklou rychlostí o velikosti v1. Nyní má přeplavat kolmo vodní proud tekoucí rychlostí o velikosti v2, plave tedy svou obvyklou rychlostí v1 šikmo proti proudu tak, že se vzdaluje kolmo od břehu. Jeho výsledná rychlost vzhledem k pozorovateli na břehu má pak velikost:","options":["v2 −v1","q v2 2 + v2","q v2 1 −v2","v1 + v2"],"correct":["C"]},{"id":"2.36","chapter":2,"chapterName":"Mechanika I","text":"Pohybová (kinetická) energie tělesa závisí:","options":["pouze na rychlosti tělesa","pouze na hmotnosti tělesa","na hmotnosti tělesa a rychlosti tělesa","na hmotnosti tělesa, hodnotě tíhového zrychlení a na poloze tělesa"],"correct":["C"]},{"id":"2.37","chapter":2,"chapterName":"Mechanika I","text":"Pokud do tíhového zrychlení započítáváme i odstředivé zrychlení Země, pak:","options":["nejmenší tíhové zrychlení je na pólech","nejmenší tíhové zrychlení je na rovníku","nejmenší tíhové zrychlení je na 45◦severní šířky","velikost tíhového zrychlení nezávisí na zeměpisné šířce"],"correct":["B"]},{"id":"2.38","chapter":2,"chapterName":"Mechanika I","text":"Polohová (potenciální) energie tělesa závisí:","options":["pouze na poloze tělesa (na jeho umístění v určité výšce)","na rychlosti tělesa","na hmotnosti tělesa a rychlosti tělesa","na hmotnosti tělesa, hodnotě tíhového zrychlení a na poloze tělesa"],"correct":["D"]},{"id":"2.39","chapter":2,"chapterName":"Mechanika I","text":"Pravdivé tvrzení je:","options":["velikost síly je vektor","moment síly je skalár","hybnost je skalár","čas je skalár"],"correct":["D"]},{"id":"2.40","chapter":2,"chapterName":"Mechanika I","text":"Pro pohyb rovnoměrný přímočarý platí tvrzení:","options":["dráha je lineární funkcí času, rychlost je konstantou","dráha je konstantou, rychlost je lineární funkcí času","dráha je kvadratickou a rychlost lineární funkcí času","dráha i rychlost jsou lineární funkcí času"],"correct":["A"]},{"id":"2.41","chapter":2,"chapterName":"Mechanika I","text":"Pro veličinu moment síly platí:","options":["je to vektor, jednotkou je kg · m · s−2","je to skalár, jednotkou je kg · m","je to skalár, jednotkou je J · m","je to vektor, jednotkou je N · m"],"correct":["D"]},{"id":"2.42","chapter":2,"chapterName":"Mechanika I","text":"Pro volný pád tělesa ve vakuu platí:","options":["rychlost volného pádu je konstantní","doba pádu je přímo úměrná výšce, ze které těleso padá","rychlost volného pádu je přímo úměrná době pádu","rychlost volného pádu závisí na hmotnosti tělesa"],"correct":["C"]},{"id":"2.43","chapter":2,"chapterName":"Mechanika I","text":"Pro volný pád tělesa ve vakuu platí:","options":["rychlost volného pádu je nepřímo úměrná době pádu","rychlost volného pádu závisí na hodnotě tíhového zrychlení v daném místě","rychlost volného pádu je konstantní","rychlost volného pádu je nižší kvůli odporu vzduchu"],"correct":["B"]},{"id":"2.44","chapter":2,"chapterName":"Mechanika I","text":"Pro volný pád tělesa ve vakuu platí:","options":["rychlost volného pádu závisí na hmotnosti tělesa","rychlost volného pádu nezávisí na hmotnosti tělesa","rychlost volného pádu nezávisí na hodnotě tíhového zrychlení v daném místě","doba pádu je přímo úměrná výšce, ze které těleso padá"],"correct":["B"]},{"id":"2.45","chapter":2,"chapterName":"Mechanika I","text":"Při rovnoměrném pohybu hmotného bodu po kružnici platí, že jeho dostředivé (centripetální) zrychlení:","options":["má stejný směr jako vektor okamžité rychlosti","je kolmé k vektoru okamžité rychlosti","svírá s vektorem okamžité rychlosti postupně různé úhly v rozsahu < 0, 2π > podle okamžité polohy hmotného bodu na kružnici","má opačný směr než vektor okamžité rychlosti"],"correct":["B"]},{"id":"2.46","chapter":2,"chapterName":"Mechanika I","text":"Při rovnoměrném pohybu hmotného bodu po kružnici platí, že jeho dostředivé zrychlení ad je (v – obvodová rychlost, ω – úhlová rychlost, f – frekvence, T – perioda, r – poloměr kružnice):","options":["ad = v2 / r","ad = ω2 · r","ad = (2π · f)2 · r","ad = 4π2 · r / T 2"],"correct":["A","B","C","D"]},{"id":"2.47","chapter":2,"chapterName":"Mechanika I","text":"Při rovnoměrném pohybu hmotného bodu po kružnici platí, že jeho dostředivé zrychlení:","options":["je rovno nule, protože jde o pohyb rovnoměrný","má směr tečny k trajektorii","má směr normály k trajektorii orientované do středu kružnice","má směr normály k trajektorii orientované od středu kružnice"],"correct":["C"]},{"id":"2.48","chapter":2,"chapterName":"Mechanika I","text":"Při rovnoměrném pohybu po kružnici o poloměru 0,1 m má hmotný bod dobu oběhu 10 s; potom platí:","options":["frekvence je rovna 10 Hz","úhlová rychlost je přibližně 0, 6 s−1","perioda je 10 s","obvodová rychlost je přibližně 0, 06 s−1"],"correct":["B","C"]},{"id":"2.49","chapter":2,"chapterName":"Mechanika I","text":"Při rovnoměrném pohybu po kružnici o poloměru r s frekvencí f je obvodová rychlost v rovna:","options":["2π f","2π r · f","2π / f","2π r / f"],"correct":["B"]},{"id":"2.50","chapter":2,"chapterName":"Mechanika I","text":"Při rovnoměrném pohybu po kružnici o poloměru r s periodou T je obvodová rychlost v rovna:","options":["2π T","2π r · T","2π / T","2π r / T"],"correct":["D"]},{"id":"2.51","chapter":2,"chapterName":"Mechanika I","text":"Při výměně kola u auta bylo třeba na povolení matic síly 200 N na konci klíče dlouhého 30 cm. Použijeme-li klíč dvojnásobné délky, budeme potřebovat sílu:","options":["100 N","400 N","50 N","800 N"],"correct":["A"]},{"id":"2.52","chapter":2,"chapterName":"Mechanika I","text":"Příliv a odliv je způsoben:","options":["gravitačním působením Měsíce","slunečními skvrnami","ozonovými dírami v atmosféře","změnami magnetického pole Země"],"correct":["A"]},{"id":"2.53","chapter":2,"chapterName":"Mechanika I","text":"Rychlost pohybu je:","options":["skalární veličina","vektorová veličina","udávána v m · s−2","veličina, jejíž jednotka je základní jednotkou SI"],"correct":["B"]},{"id":"2.54","chapter":2,"chapterName":"Mechanika I","text":"Rychlost rovnoměrně zrychleného pohybu se:","options":["nemění","nepravidelně mění","rovnoměrně mění (zvyšuje nebo snižuje)","udává v m · s−2"],"correct":["C"]},{"id":"2.55","chapter":2,"chapterName":"Mechanika I","text":"Rychlost rovnoměrného přímočarého pohybu se:","options":["zvětšuje","zmenšuje","nepravidelně mění","nemění"],"correct":["D"]},{"id":"2.56","chapter":2,"chapterName":"Mechanika I","text":"Síla F působí na těleso, způsobuje jeho pohyb po dráze s a tím vykonává mechanickou práci W. Směr síly F svírá úhel α se směrem posunutí tělesa. Pak platí:","options":["W = F · s · sin α","W = F · s · cos α","W = F · s / sin α","W = F · s / cos α"],"correct":["B"]},{"id":"2.57","chapter":2,"chapterName":"Mechanika I","text":"Síla F působící ve směru horizontálního pohybu překonává tření a tím udržuje těleso v rovnoměrném přímočarém pohybu rychlostí v. K tomu je zapotřebí výkon:","options":["určený vztahem P = F · v","přímo úměrný třecí síle","přímo úměrný rychlosti tělesa","přímo úměrný kinetické energii tělesa"],"correct":["A","B","C"]},{"id":"2.58","chapter":2,"chapterName":"Mechanika I","text":"Sněhové vločky padají k zemi za bezvětří rychlostí 8 cm/s. Vítr, který začne foukat vodorovným směrem, je snese každou sekundu o 6 cm stranou. Rychlost vločky při tomto větru vzhledem k zemi je:","options":["14 cm/s","2 cm/s","přibližně 5, 3 cm/s","0, 1 m/s"],"correct":["D"]},{"id":"2.59","chapter":2,"chapterName":"Mechanika I","text":"Správné tvrzení týkající se rovnoměrného pohybu po kružnici je:","options":["jednotkou obvodové rychlosti je m · s−1","jednotkou úhlové rychlosti je rad · s−1","úhlová rychlost je přímo úměrná periodě kruhového pohybu","obvodová rychlost je nepřímo úměrná frekvenci kruhového pohybu"],"correct":["A","B"]},{"id":"2.60","chapter":2,"chapterName":"Mechanika I","text":"Správné tvrzení týkající se rovnoměrného pohybu po kružnici je:","options":["jednotkou obvodové rychlosti je s−1","jednotkou úhlové rychlosti je m · s−1","úhlová rychlost je přímo úměrná frekvenci kruhového pohybu","obvodová rychlost je nepřímo úměrná periodě kruhového pohybu"],"correct":["C","D"]},{"id":"2.61","chapter":2,"chapterName":"Mechanika I","text":"Stav beztíže nastává:","options":["pouze v případě, kdy nepůsobí žádné gravitační pole","ve volně padajícím výtahu, zanedbáme-li odpor vzduchu","v letadle, jehož vektor zrychlení se rovná vektoru zrychlení gravitačního a směřuje svisle dolů","v tělese na oběžné dráze kolem Země"],"correct":["B","C","D"]},{"id":"2.62","chapter":2,"chapterName":"Mechanika I","text":"Těleso může přejít z rovnoměrného přímočarého pohybu do rovnoměrného pohybu po kružnici, jestliže na něj začne působit:","options":["dostředivá síla","výslednice síly dostředivé a tečné","síla ve směru tečny ke kruhové dráze","odstředivá síla"],"correct":["A"]},{"id":"2.63","chapter":2,"chapterName":"Mechanika I","text":"Těleso se pohybuje nenulovou rychlostí. Proti směru pohybu působí síla tření. Působí-li ve směru pohybu síla menší než je síla tření, pak se těleso bude pohybovat:","options":["rovnoměrně přímočaře","rovnoměrně zrychleně, přičemž velikost zrychlení nezávisí na hmotnosti tělesa","zpomaleně","rovnoměrně zrychleně, přičemž velikost zrychlení závisí na hmotnosti tělesa"],"correct":["C"]},{"id":"2.64","chapter":2,"chapterName":"Mechanika I","text":"Těleso se pohybuje nenulovou rychlostí. Proti směru pohybu působí síla tření. Ve směru pohybu působí síla stejně veliká jako je síla tření. Žádná další síla na těleso nepůsobí. Těleso se bude pohybovat:","options":["rovnoměrně přímočaře","rovnoměrně zrychleně","rovnoměrně zpomaleně","nerovnoměrně"],"correct":["A"]},{"id":"2.65","chapter":2,"chapterName":"Mechanika I","text":"Těleso se pohybuje nenulovou rychlostí. Proti směru pohybu působí síla tření. Ve směru pohybu působí síla stejně veliká, jako je síla tření; žádná další síla na těleso nepůsobí:","options":["pak se těleso bude pohybovat rovnoměrně přímočaře","pak se kinetická energie tělesa bude zvyšovat","pak se těleso bude pohybovat rovnoměrně zpomaleně","pak se kinetická energie tělesa nebude v čase měnit"],"correct":["A","D"]},{"id":"2.66","chapter":2,"chapterName":"Mechanika I","text":"Tíhová síla, která působí na těleso položené bez tření na nakloněné rovině:","options":["uděluje tělesu zrychlení, které je vždy rovno tíhovému zrychlení","se úplně kompenzuje reakcí podložky tělesa","se zčásti kompenzuje reakcí podložky tělesa a zčásti uděluje tělesu zrychlení, jehož velikost závisí na naklonění roviny","je nulová, protože nejde o volný pád"],"correct":["C"]},{"id":"2.67","chapter":2,"chapterName":"Mechanika I","text":"Určete správné vztahy pro vyjádření veličiny práce a veličiny výkonu (kde W – práce, P – výkon, F – síla, s – posunutí, t – čas, přičemž předpokládáme, že síla F působí ve směru posunutí s, že se jedná o rovnoměrný pohyb a že výkon je během posunování konstantní):","options":["W = F · s","P = W / t","W = P / t","P = F · s / t"],"correct":["A","B","D"]},{"id":"2.68","chapter":2,"chapterName":"Mechanika I","text":"Určete, jaký rozměr přísluší veličině X ve vztahu X = (∆p / ∆t) · s, kde ∆p je změna hybnosti tělesa za dobu ∆t, s je dráha uražená tělesem:","options":["kg · m2 · s−2","kg · m2 · s2","kg · m2 · s−1","kg2 · m · s−2"],"correct":["A"]},{"id":"2.69","chapter":2,"chapterName":"Mechanika I","text":"Uvažujme graf znázorňující různé veličiny v závislosti na čase t pro rovnoměrně zrychlený pohyb z nulové počáteční rychlosti. Pak platí:","options":["dráhu znázorňuje přímka rovnoběžná s osou t","zrychlení znázorňuje přímka rovnoběžná s osou t","dráhu znázorňuje stoupající přímka procházející počátkem","rychlost znázorňuje stoupající přímka procházející počátkem"],"correct":["B","D"]},{"id":"2.70","chapter":2,"chapterName":"Mechanika I","text":"Uvažujme grafy znázorňující různé veličiny v závislosti na čase t pro rovnoměrně zrychlený pohyb z nulové počáteční rychlosti. Pak platí:","options":["zrychlení znázorňuje stoupající přímka procházející počátkem","dráhu znázorňuje větev paraboly procházející počátkem","dráhu znázorňuje stoupající přímka procházející počátkem","rychlost znázorňuje rovnoběžka s osou t"],"correct":["B"]},{"id":"2.71","chapter":2,"chapterName":"Mechanika I","text":"Uvažujme rovnoměrně zrychlený pohyb a pro něj graf znázorňující závislost dráhy s na čase t. Dráhu pohybu znázorňuje:","options":["přímka svírající úhel α = 0 s osou t","přímka svírající úhel α > 0 s osou t","přímka svírající úhel α < 0 s osou t","parabola"],"correct":["D"]},{"id":"2.72","chapter":2,"chapterName":"Mechanika I","text":"Uvažujme rovnoměrně zrychlený pohyb a pro něj graf znázorňující závislost velikosti zrychlení a na čase t. Velikost zrychlení znázorňuje:","options":["přímka totožná s osou t","přímka rovnoběžná s osou t","stoupající exponenciála procházející bodem [0, 0]","stoupající parabola procházející bodem [0, 0]"],"correct":["B"]},{"id":"2.73","chapter":2,"chapterName":"Mechanika I","text":"Uvažujme rovnoměrný přímočarý pohyb a pro něj graf znázorňující závislost dráhy s na čase t. Dráhu pohybu znázorňuje:","options":["polopřímka rovnoběžná (ale ne totožná) s osou s","přímka","stoupající exponenciála procházející bodem [0, 0]","stoupající hyperbola neprocházející bodem [0, 0]"],"correct":["B"]},{"id":"2.74","chapter":2,"chapterName":"Mechanika I","text":"Uvažujme rovnoměrný přímočarý pohyb a pro něj graf znázorňující závislost velikosti zrychlení a na čase t. Velikost zrychlení znázorňuje:","options":["přímka totožná s osou t","přímka rovnoběžná s osou t, která s ní ale není totožná","přímka svírající s osou t úhel α > 0","hyperbola"],"correct":["A"]},{"id":"2.75","chapter":2,"chapterName":"Mechanika I","text":"Uvedené jednotky fyzikálních veličin lze pomocí základních jednotek soustavy SI vyjádřit jako:","options":["síla – kg · m · s−2","hybnost – kg · m · s−1","výkon – kg · m3 · s−3","práce – kg · m3 · s−2"],"correct":["A","B"]},{"id":"2.76","chapter":2,"chapterName":"Mechanika I","text":"V člunu stojí muž, který se přitahuje ke břehu pomocí lana silou o velikosti F, přičemž v prvním případě je lano přivázáno druhým koncem ke kolíku na břehu a ve druhém případě lano drží na břehu jiný muž a působí na ně také silou o velikosti F, ale opačného směru než muž v lod’ce. Vysvětlete, jak se bude lišit průběh pokusu v prvním a druhém případě:","options":["působením člověka na břehu se pohyb lod’ky urychlí, nebot’ jeho síla zvýší celkovou sílu přitahování","pohyb lod’ky se lišit nebude, nebot’ kůl působí na lano silou o velikosti F v opačném směru než člověk na lod’ce","přitahování lod’ky ke břehu bude ve druhém případě pro člověka na lod’ce méně namáhavé","pohyb lod’ky ve druhém případě bude rychlejší, nebot’ síla člověka v lod’ce a na břehu se sčítají"],"correct":["B"]},{"id":"2.77","chapter":2,"chapterName":"Mechanika I","text":"V mikrovlnné troubě se točí talíř o průměru 32 cm rychlostí 6 otáček za minutu. Přibližná obvodová rychlost na jeho okraji je:","options":["0, 1 m/s","0, 2 m/s","1 m/s","0, 6 m/s"],"correct":["A"]},{"id":"2.78","chapter":2,"chapterName":"Mechanika I","text":"Ve sluneční soustavě:","options":["je největší planetou Jupiter","je Venuše blíž ke Slunci než Země","platí druhý Keplerův zákon","vzdálenější planety obíhají s menší úhlovou rychlostí"],"correct":["A","B","C","D"]},{"id":"2.79","chapter":2,"chapterName":"Mechanika I","text":"Ve vodorovné rovině krouží kulička přivázaná na niti. V určitém okamžiku se nit přetrhne. Jaký bude směr pohybu kuličky ihned po přetržení nitě?","options":["normálový, to znamená ve směru spojnice střed otáčeni kulička v okamžiku přetržení","tečný ke kružnici, která byla před přetržením její trajektorií, v bodě, kde byla kulička v okamžiku přetržení","kulička se bude dál pohybovat po kružnici","šikmý – mezi směrem normálovým a tečným, úhel je závislý na obvodové rychlosti kuličky v okamžiku přetržení nitě"],"correct":["B"]},{"id":"2.80","chapter":2,"chapterName":"Mechanika I","text":"Velikost odstředivého (centrifugálního) zrychlení na zemském povrchu:","options":["je největší na rovníku","je největší na pólech","je všude stejná","je všude nulová"],"correct":["A"]},{"id":"2.81","chapter":2,"chapterName":"Mechanika I","text":"Velikost úhlové rychlosti ω rovnoměrného otáčivého pohybu s frekvencí f po kružnici o poloměru r se vypočítá podle vztahu:","options":["ω = 2π · f","ω = 2π · r · f","ω = 2π / f","ω = 2π · r / f"],"correct":["A"]},{"id":"2.82","chapter":2,"chapterName":"Mechanika I","text":"Vlak se rozjíždí po rovině se zrychlením 0, 5 m/s2. Rychlosti 72 km/h dosáhne za:","options":["144 s","40 s","36 s","0, 4 h"],"correct":["B"]},{"id":"2.83","chapter":2,"chapterName":"Mechanika I","text":"Vzdálenost 1 km na zastávku autobusu ujde školák za 10 minut a okamžitě pokračuje autobusem do školy. Vzdálenost 15 km ke škole urazí autobus za 20 minut. Průměrná rychlost školáka cestou do školy je:","options":["16 km/h","5, 3 km/h","32 km/h","25, 5 km/h"],"correct":["C"]},{"id":"2.84","chapter":2,"chapterName":"Mechanika I","text":"Vztah pro vyjádření kinetické energie hmotného bodu má tvar (m – hmotnost, v – rychlost, g – tíhové zrychlení, h – výška):","options":["Ek = m · v2 / 2","Ek = m · v / 2","Ek = m · v2","Ek = m · g · h"],"correct":["A"]},{"id":"2.85","chapter":2,"chapterName":"Mechanika I","text":"Z uvedených veličin není skalárem:","options":["délka dráhy","čas","tíha","velikost rychlosti"],"correct":["C"]},{"id":"2.86","chapter":2,"chapterName":"Mechanika I","text":"Začne-li na těleso, které bylo v klidu, působit stálá nenulová síla, bude se těleso pohybovat:","options":["rovnoměrně zrychleným pohybem ve směru působící síly","rovnoměrně zrychleným pohybem proti směru působící síly","rovnoměrně přímočaře ve směru působící síly","rovnoměrně přímočaře proti směru působící síly 3 Mechanika II"],"correct":["A"]},{"id":"3.01","chapter":3,"chapterName":"Mechanika II","text":"9, 81 Pa lze vyjádřit jako:","options":["1 N","9, 81 kg · m−1 · s−2","9, 81 N · m2","9, 81 N · m−2"],"correct":["B","D"]},{"id":"3.02","chapter":3,"chapterName":"Mechanika II","text":"Akvárium ve tvaru hranolu má výšku 60 cm; pět šestin jeho objemu je zaplněno vodou. Akvárium stojí na rovné pevné podložce, na jeho boční stěny působí zevnitř tlak vody, zvenku tlak atmosférický. Potom platí:","options":["rozdíl tlaků (tlaku kapaliny a tlaku podložky) na dno je 6 Pa","rozdíl tlaků na boční stěnu u dna je 5 kPa","rozdíl tlaků na boční stěnu ve výšce hladiny je nulový","rozdíl tlaků na boční stěnu u dna je 100 kPa"],"correct":["B","C"]},{"id":"3.03","chapter":3,"chapterName":"Mechanika II","text":"Akvárium ve tvaru hranolu má výšku 75 cm; dvě třetiny jeho objemu jsou zaplněny vodou. Akvárium stojí na rovné pevné podložce, na jeho boční stěny působí zevnitř tlak vody, zvenku tlak atmosférický. Potom platí:","options":["rozdíl tlaku kapaliny na dno a tlaku podložky je nulový","rozdíl tlaků na boční stěnu u dna je 7,5 kPa","rozdíl tlaků na boční stěnu těsně pod hladinou je 100 kPa","rozdíl tlaků na boční stěnu u dna je 5000 Pa"],"correct":["A","D"]},{"id":"3.04","chapter":3,"chapterName":"Mechanika II","text":"Automobil o celkové hmotnosti 1000 kg se rozjíždí po vodorovné vozovce z klidu a za dobu 10 s dosáhne rychlosti 20 m/s. Jeho výkon, neuvažujeme-li ztráty, musel být alespoň:","options":["1 000 W","2 kW","20 kW","200 000 J"],"correct":["C"]},{"id":"3.05","chapter":3,"chapterName":"Mechanika II","text":"Během 10 minut potřebujeme vyčerpat 10 hl vody z hloubky 10 m, účinnost čerpadla je 90 %. Potom:","options":["příkon čerpadla 150 W bude dostačující","spotřebujeme alespoň 1 kWh energie","potenciální energie vody stoupne o 100 kJ","průtok čerpadlem bude 0, 1 m3/min"],"correct":["C","D"]},{"id":"3.06","chapter":3,"chapterName":"Mechanika II","text":"Bernoulliho rovnice pro proudění ideální kapaliny ve vodorovné trubici má tvar (p – tlak kapaliny, ρ – hustota kapaliny, V – objem, v – rychlost proudění, m – hmotnost):","options":["p + ρ · v2 = konst.","p · V + 1/2 · ρ · v2 = konst.","p + 1/2 · ρ · v2 = konst.","p + 1/2 · m · v2 = konst."],"correct":["C"]},{"id":"3.07","chapter":3,"chapterName":"Mechanika II","text":"Bernoulliho rovnice vyjadřuje:","options":["zákon zachování energie ideální kapaliny","zákon zachování hybnosti ideální kapaliny","závislost tlaku plynu na teplotě","závislost turbulencí v kapalině na rychlosti"],"correct":["A"]},{"id":"3.08","chapter":3,"chapterName":"Mechanika II","text":"Dva hmotné body, každý o hmotnosti 50 kg, umístěné ve vzájemné vzdálenosti 50 cm, se přitahují gravitační silou (κ = 6, 67 · 10−11 N · m2/kg2):","options":["6, 67 · 10−11 N","6, 67 · 10−7 N","6, 67 · 10−9 N","3, 34 · 10−7 N"],"correct":["B"]},{"id":"3.09","chapter":3,"chapterName":"Mechanika II","text":"Dvě nádoby s kapalinou jsou uzavřeny pohyblivým kruhovým pístem. V první nádobě působí síla F na píst o poloměru r a vyvolá v kapalině tlak p. V druhé nádobě bude stejná síla F působit na píst o poloměru 2r ; pak tlak v této kapalině bude vzhledem k tlaku p :","options":["dvojnásobný","čtyřnásobný","poloviční","čtvrtinový"],"correct":["D"]},{"id":"3.10","chapter":3,"chapterName":"Mechanika II","text":"Dvě nádoby s kapalinou jsou uzavřeny pohyblivým pístem. V první nádobě působí síla F na píst s plochou S a vyvolá v kapalině tlak p. V druhé nádobě bude stejná síla F působit na píst s plochou 2S; pak tlak v této kapalině bude vzhledem k tlaku p:","options":["dvojnásobný","čtyřnásobný","poloviční","čtvrtinový"],"correct":["C"]},{"id":"3.11","chapter":3,"chapterName":"Mechanika II","text":"Dvě nádoby se stejnou plochou dna, jedna válcová a druhá kuželovitě se zužující, jsou naplněny vodou do stejné výše. Potom:","options":["v obou nádobách bude na dno působit stejná tlaková síla, protože plochy dna nádob a výšky kapaliny jsou si rovné","v obou nádobách bude na dno působit různá tlaková síla, protože objem kapaliny v nádobách se liší","v obou nádobách bude u dna stejný hydrostatický tlak, protože výška kapaliny v nádobách je stejná","v obou nádobách bude u dna různý hydrostatický tlak, protože hmotnost kapaliny v nádobách je různá"],"correct":["A","C"]},{"id":"3.12","chapter":3,"chapterName":"Mechanika II","text":"Dvojice sil jsou","options":["jakékoli dvě síly opačného směru,","dvě síly stejné velikosti a opačného směru, které leží v přímce","dvě síly stejné velikosti a opačného směru, působící na totéž těleso, které neleží v přímce","dvě síly stejného směru, působící na totéž těleso"],"correct":["C"]},{"id":"3.13","chapter":3,"chapterName":"Mechanika II","text":"Gravitační konstanta má při použití soustavy SI číselnou velikost 6, 67 · 10−11. Z gravitačního zákona můžeme odvodit, že její jednotkou je:","options":["N","N · kg2/m2","N · m2/kg2","m3/(s2 · kg)"],"correct":["C","D"]},{"id":"3.14","chapter":3,"chapterName":"Mechanika II","text":"Gravitační potenciální energii tělesa o hmotnosti m v malé výšce h nad Zemí vyjádříme vztahem (K – intenzita gravitačního pole; předpokládáme, že Ep = 0 pro h = 0):","options":["Ep = m · K / h","Ep = m · K · h / 2","Ep = m · K · h","Ep = m · K · h2 / 2"],"correct":["C"]},{"id":"3.15","chapter":3,"chapterName":"Mechanika II","text":"Hodnotě hydrostatického tlaku v hloubce 10 m pod hladinou vody je nejblíže hodnota:","options":["100 kPa","10 000 Pa","106 Pa","98, 1 Pa"],"correct":["A"]},{"id":"3.16","chapter":3,"chapterName":"Mechanika II","text":"Hookův zákon platí:","options":["v celém rozsahu deformace materiálu","i v oblasti plastické (trvalé) deformace","až do meze pevnosti materiálu","v oblasti pružné deformace materiálu"],"correct":["D"]},{"id":"3.17","chapter":3,"chapterName":"Mechanika II","text":"Hookův zákon vyjadřuje vzájemný vztah veličin (ϵ – relativní prodloužení, E – modul pružnosti v tahu, σ – normálové napětí) tak, že:","options":["ϵ = E · σ","σ = E / ϵ","σ = E · ϵ","σ = E2 · ϵ"],"correct":["C"]},{"id":"3.18","chapter":3,"chapterName":"Mechanika II","text":"Hydrostatický tlak p závisí na hloubce h, hustotě kapaliny ρ a tíhovém zrychlení g podle vztahu:","options":["p = h · g / ρ","p = h · ρ · g2","p = h · ρ / g","p = h · ρ · g"],"correct":["D"]},{"id":"3.19","chapter":3,"chapterName":"Mechanika II","text":"Hydrostatický tlak v kapalině je:","options":["skalární veličina vyvolaná vnější tlakovou silou","skalární veličina vyvolaná tíhovou silou","vektorová veličina vyvolaná tíhovou silou","vektorová veličina vyvolaná vnější tlakovou silou"],"correct":["B"]},{"id":"3.20","chapter":3,"chapterName":"Mechanika II","text":"Hydrostatický tlak v kapalině v určité hloubce pod volným povrchem kapaliny je:","options":["úměrný hloubce","úměrný zeměpisné šířce","úměrný druhé odmocnině hloubky","úměrný druhé mocnině hloubky"],"correct":["A"]},{"id":"3.21","chapter":3,"chapterName":"Mechanika II","text":"Jakou práci v joulech vykoná zařízení s výkonem 2,5 kW za 3 hodiny?","options":["75 J","2 J","27 MJ","75 MJ"],"correct":["C"]},{"id":"3.22","chapter":3,"chapterName":"Mechanika II","text":"Jednotka J · kg−1 je rovna:","options":["m2 · s−2","N · m · kg−1","N · m−1 · kg−1","m · s−2"],"correct":["A","B"]},{"id":"3.23","chapter":3,"chapterName":"Mechanika II","text":"Jednotka joule je rovna:","options":["N · m−1","N · m","N · m−2","N · m2"],"correct":["B"]},{"id":"3.24","chapter":3,"chapterName":"Mechanika II","text":"Jednotka joule je vyjádřena v základních jednotkách takto:","options":["kg · m2 · s−1","kg · m−2 · s2","kg · m2 · s−2","kg · m−1 · s2"],"correct":["C"]},{"id":"3.25","chapter":3,"chapterName":"Mechanika II","text":"Jednotka pascal je rovna:","options":["N · m−2","N · m2","J · m−2","N · s−1"],"correct":["A"]},{"id":"3.26","chapter":3,"chapterName":"Mechanika II","text":"Jednotka pascal je vyjádřena v základních jednotkách takto:","options":["kg · m2 · s−1","kg · m−1 · s−2","kg · m2 · s−2","kg · m−1 · s2"],"correct":["B"]},{"id":"3.27","chapter":3,"chapterName":"Mechanika II","text":"Jednotka watt je rovna:","options":["J · s","J · s−1","N · s","N · s−1"],"correct":["B"]},{"id":"3.28","chapter":3,"chapterName":"Mechanika II","text":"Jednotka watt je vyjádřena v základních jednotkách takto:","options":["kg · m2 · s−1","kg · m−1 · s−2","kg · m2 · s−2","kg · m2 · s−3"],"correct":["D"]},{"id":"3.29","chapter":3,"chapterName":"Mechanika II","text":"Jednotkou energie je:","options":["joule","pascal","watt","newton"],"correct":["A"]},{"id":"3.30","chapter":3,"chapterName":"Mechanika II","text":"Jednotkou tlaku je:","options":["pascal (Pa)","technická atmosféra (atp)","bar","torr"],"correct":["A","B","C","D"]},{"id":"3.31","chapter":3,"chapterName":"Mechanika II","text":"Jednotkou tlaku je:","options":["joule","pascal","watt","newton"],"correct":["B"]},{"id":"3.32","chapter":3,"chapterName":"Mechanika II","text":"Jednotkou účinnosti je:","options":["1 (bezrozměrná jednotka)","newton","joule","watt"],"correct":["A"]},{"id":"3.33","chapter":3,"chapterName":"Mechanika II","text":"Jednotkou výkonu je:","options":["joule","pascal","watt","newton"],"correct":["C"]},{"id":"3.34","chapter":3,"chapterName":"Mechanika II","text":"Jednotku 1 W lze vyjádřit jako:","options":["1 N · m · s−1","1 kg · m2 · s−2","1 J · s","1 kg · m2 · s−3"],"correct":["A","D"]},{"id":"3.35","chapter":3,"chapterName":"Mechanika II","text":"Kapalina proudí vodorovně ležící trubicí, která se v určitém, dále uvažovaném úseku zužuje. V závislosti na zmenšujícím se průřezu (tedy ve směru proudu):","options":["se tlak na stěny trubice nemění","se rychlost kapaliny zmenšuje a její velikost je přímo úměrná obsahu průřezu trubice","se rychlost kapaliny zmenšuje a její velikost je přímo úměrná průměru trubice","tlak na stěny trubice klesá a může dosáhnout hodnot nižších než atmosférický tlak"],"correct":["D"]},{"id":"3.36","chapter":3,"chapterName":"Mechanika II","text":"Kapalina proudí vodorovně ležící rovnou trubicí, která se v určitém, dále uvažovaném úseku zužuje. V závislosti na zmenšujícím se průřezu (tedy ve směru proudu):","options":["tlak na stěny trubice stoupá","se rychlost kapaliny zvětšuje a její velikost je nepřímo úměrná ploše průřezu trubice","se rychlost kapaliny zvětšuje a její velikost je nepřímo úměrná průměru trubice","tlak na stěny trubice klesá, ale nemůže dosáhnout hodnot nižších než atmosférický tlak"],"correct":["B"]},{"id":"3.37","chapter":3,"chapterName":"Mechanika II","text":"Kilowatthodina je jednotkou:","options":["výkonu","elektrického příkonu","elektrického výkonu","energie"],"correct":["D"]},{"id":"3.38","chapter":3,"chapterName":"Mechanika II","text":"Kilowatthodina je:","options":["jednotka impulsu síly","jednotka momentu setrvačnosti","rovna 4200 J","rovna 3, 6 · 106 J"],"correct":["D"]},{"id":"3.39","chapter":3,"chapterName":"Mechanika II","text":"Koncovka hadice má čtyřikrát menší poloměr, než je poloměr hadice. Pomocí této koncovky se velikost rychlosti vytékající kapaliny oproti původní rychlosti kapaliny v hadici zvýší:","options":["dvakrát","šestnáctkrát","čtyřikrát","osmkrát"],"correct":["B"]},{"id":"3.40","chapter":3,"chapterName":"Mechanika II","text":"Laminární proudění reálné kapaliny má následující vlastnosti:","options":["netvoří se víry, vrstvy kapaliny se nepromíchávají","proudnice se protínají, ale kapalina nevíří","rychlost kapaliny je ve všech místech průřezu stejná","proudnice se protínají, vytváří víry"],"correct":["A"]},{"id":"3.41","chapter":3,"chapterName":"Mechanika II","text":"Lyžař o hmotnosti 80 kg stojí na běžkách délky 200 cm a šířky 5 cm. Obě nohy zatěžuje stejně. Průměrný tlak na sníh, který lyžař způsobuje, má velikost přibližně:","options":["4 kPa","0,8 Pa","0,4 Pa","8 Pa"],"correct":["A"]},{"id":"3.42","chapter":3,"chapterName":"Mechanika II","text":"Mějme dvě nádoby se stejnou velikostí ploch dna, jednu válcovou, druhou kuželovitě se zužující ve směru ke dnu, obě naplněné stejnou kapalinou do stejné výše. Zvolte správné tvrzení:","options":["v obou nádobách bude různý tlak u dna, ale na dno bude působit stejná tlaková síla","v obou nádobách bude stejný tlak u dna, ale na dno bude působit nestejná tlaková síla","v obou nádobách bude stejný jak tlak u dna, tak tlaková síla působící na dno","v obou nádobách bude různý tlak i různá tlaková síla působící na dno"],"correct":["C"]},{"id":"3.43","chapter":3,"chapterName":"Mechanika II","text":"Mějme dvě stejné skleničky – v první z nich je obyčejná voda, v druhé je sodovka (voda s bublinkami kysličníku uhličitého; obsah CO2 rozpuštěného ve vodě zanedbáváme). Pak platí:","options":["v nádobě se sodovkou je větší hydrostatický tlak než ve stejné hloubce nádoby s obyčejnou vodou","v nádobě se sodovkou je menší hydrostatický tlak než ve stejné hloubce nádoby s obyčejnou vodou","v nádobě se sodovkou je stejný hydrostatický tlak jako ve stejné hloubce nádoby s obyčejnou vodou","uniká-li ze sodovky kysličník uhličitý, bude se hustota kapaliny zmenšovat"],"correct":["B"]},{"id":"3.44","chapter":3,"chapterName":"Mechanika II","text":"Motor o příkonu 4 kW pracuje s účinností 80 %. Pracuje-li 4 hodiny, vykoná práci:","options":["12,8 kWh","12,8 kJ","16 kWh","16 kJ"],"correct":["A"]},{"id":"3.45","chapter":3,"chapterName":"Mechanika II","text":"Motor o příkonu 5 kW pracuje s účinností 80 %. Pracuje-li 2,5 hodiny, vykoná práci:","options":["36 · 106 J","3, 6 · 106 J","10 · 103 J","10 kJ"],"correct":["A"]},{"id":"3.46","chapter":3,"chapterName":"Mechanika II","text":"Na volném povrchu vody v kádince plave nádobka, na jejímž dně je malý kousek olova. Jestliže tento kousek olova vyjmeme z nádobky a vhodíme do vody v kádince, pak hladina vody:","options":["poklesne, nebot’ objem kousku olova je menší, než objem vody, který má stejnou hmotnost","nezmění se","stoupne, nebot’ její objem se zvýší o objem kousku olova","poklesne, nebot’ objem kousku olova je větší, než objem vody, který má stejnou hmotnost"],"correct":["A"]},{"id":"3.47","chapter":3,"chapterName":"Mechanika II","text":"Nestlačitelné těleso tvaru válce je zcela ponořeno v hloubce 5 m pod hladinou. Jak se změní vztlaková síla, jestliže těleso ponoříme do hloubky 15 m","options":["zvětší se 3krát","zmenší se 3krát","nezmění se","zvětší se 9krát"],"correct":["C"]},{"id":"3.48","chapter":3,"chapterName":"Mechanika II","text":"Normální atmosférický tlak má přibližně hodnotu:","options":["1000 Pa","106 Pa","10 kPa","100 kPa"],"correct":["D"]},{"id":"3.49","chapter":3,"chapterName":"Mechanika II","text":"Normální tlak, tj. tlak za normálních podmínek, udržuje v přibližně rovnováze:","options":["sloupec rtuti o výšce 760 mm","sloupec rtuti o výšce 1 m","sloupec vody o výšce 10 m","sloupec vody o výšce 1 m"],"correct":["A","C"]},{"id":"3.50","chapter":3,"chapterName":"Mechanika II","text":"Označme E1 kinetickou energii homogenní koule rotující kolem osy (procházející jejím těžištěm) úhlovou rychlostí ω a E2 kinetickou energii stejné koule při její rotaci kolem osy, která je její tečnou, stejnou úhlovou rychlostí. Jaký je vztah mezi E1 a E2?","options":["E1 = E2","E1 > E2","E1 < E2","o vztahu energií nelze rozhodnout, záleží na poloze osy a smyslu rotace"],"correct":["C"]},{"id":"3.51","chapter":3,"chapterName":"Mechanika II","text":"Pascalův zákon:","options":["neplatí ve stavu beztíže","platí pouze pro kapaliny, nikoli pro plyny","platí přesně pouze při teplotě absolutní nuly","platí i ve stavu beztíže"],"correct":["D"]},{"id":"3.52","chapter":3,"chapterName":"Mechanika II","text":"Platí převodní vztah:","options":["1 J = 1 N · m−1","1 J = 1 W · s−1","1 J = 1 Pa · m3","1 J = 1 N · m2"],"correct":["C"]},{"id":"3.53","chapter":3,"chapterName":"Mechanika II","text":"Platí tvrzení:","options":["vztlaková síla je vektor","hydrostatický tlak je vektor","tlaková síla je skalár","tlak je vektor"],"correct":["A"]},{"id":"3.54","chapter":3,"chapterName":"Mechanika II","text":"Platí tvrzení:","options":["manometr je tlakoměr","barometr je tlakoměr pro měření atmosférického tlaku","aneroid je druh barometru, založený na deformaci dutého uzavřeného prostoru vnějším tlakem","barometrický tlak je synonymem tlaku atmosférického"],"correct":["A","B","C","D"]},{"id":"3.55","chapter":3,"chapterName":"Mechanika II","text":"Platí tvrzení:","options":["zemský kvadrant je dlouhý přibližně 10 000 km","obvod rovníku je přibližně 4 · 107m","nejvyšší hora světa Mount Everest je vysoká přibližně 8848 m","největší naměřená hloubka oceánu v Mariánském příkopě je přibližně 11 km"],"correct":["A","B","C","D"]},{"id":"3.56","chapter":3,"chapterName":"Mechanika II","text":"Platí tvrzení:","options":["Bernoulliho rovnice vyjadřuje zákon zachování energie v proudící kapalině","při určité rychlosti se proudění kapaliny mění z laminárního na turbulentní","velikosti okamžitých rychlostí molekul reálné kapaliny se v celém průřezu trubice neliší","měření rychlosti toku krve může být založeno na Dopplerově jevu"],"correct":["A","B","D"]},{"id":"3.57","chapter":3,"chapterName":"Mechanika II","text":"Platí:","options":["vektor násobený skalárem je vektor","čas je vektorová veličina","moment setrvačnosti je vektorová veličina","kinetická energie je vektor"],"correct":["A"]},{"id":"3.58","chapter":3,"chapterName":"Mechanika II","text":"Plocha podrážek sportovní obuvi je dvojnásobkem plochy podrážek společenské obuvi. Tlak osoby ve společenské obuvi na podlahu:","options":["je dvojnásobný než tlak téže osoby ve sportovní obuvi","je poloviční než tlak téže osoby ve sportovní obuvi","je stejný jako tlak téže osoby ve sportovní obuvi, protože osoba působí vždy stejnou tíhovou silou","závisí jen na hmotnosti osoby a hodnotě tíhového zrychlení"],"correct":["A"]},{"id":"3.59","chapter":3,"chapterName":"Mechanika II","text":"Pojem tekutina:","options":["zahrnuje kapaliny a plyny","označuje kapaliny o vysoké viskozitě (tj. s velkým vnitřním třením)","označuje kapaliny o nízké viskozitě (tj. s nízkým vnitřním třením)","je synonymem pojmu kapalina"],"correct":["A"]},{"id":"3.60","chapter":3,"chapterName":"Mechanika II","text":"Poměr hustoty ledovce k hustotě mořské vody je 0,89. Jak velký objem plovoucího ledovce vyčnívá nad hladinu?","options":["nelze ze zadaných údajů určit","6 %","22 %","11 %"],"correct":["D"]},{"id":"3.61","chapter":3,"chapterName":"Mechanika II","text":"Pro převody mezi jednotkami platí:","options":["1 J · kg−1 · K−1 = 1 m · s−2 · K−1","1 W = 1 Pa · m · s−1","1 Pa = 1 J · m−3","1 W · m−2 = 1 kg · s−3"],"correct":["C","D"]},{"id":"3.62","chapter":3,"chapterName":"Mechanika II","text":"Pro uvedené pojmy platí:","options":["absolutní tlak je tlak vyjádřený vzhledem k absolutnímu vakuu","přetlak je relativní tlak vzhledem k okolnímu tlaku","podtlak vyjadřuje rozdíl, o kolik je nějaký tlak nižší než okolní tlak","atmosférický tlak je aerostatický tlak ovzduší"],"correct":["A","B","C","D"]},{"id":"3.63","chapter":3,"chapterName":"Mechanika II","text":"Pro uvedené vleličiny platí:","options":["hustota je skalární veličina","tlak je vektorová veličina","práce je vektorová veličina","velikost vektoru je skalár"],"correct":["A","D"]},{"id":"3.64","chapter":3,"chapterName":"Mechanika II","text":"Převed’te jednotku modulu pružnosti v tahu E do základních jednotek soustavy SI:","options":["kg · m−2 · s−2","kg · m−1 · s−2","kg · m−3 · s−2","kg · m−1 · s−1"],"correct":["B"]},{"id":"3.65","chapter":3,"chapterName":"Mechanika II","text":"Při rovnoměrném pohybu po kružnici o poloměru 0,1 m má hmotný bod dobu oběhu 10 s; pak:","options":["frekvence je rovna 0, 1 Hz","úhlová rychlost je 0, 6 m/s","perioda je 0, 1 Hz","obvodová rychlost je přibližně 0, 06 m/s"],"correct":["A","D"]},{"id":"3.66","chapter":3,"chapterName":"Mechanika II","text":"Při ustáleném proudění nestlačitelné kapaliny proudovou trubicí s měnícím se průřezem je v každém místě velikost rychlosti kapaliny:","options":["přímo úměrná průřezu trubice","nepřímo úměrná průřezu trubice","přímo úměrná průměru trubice","nepřímo úměrná průměru trubice"],"correct":["B"]},{"id":"3.67","chapter":3,"chapterName":"Mechanika II","text":"Působí-li na tyč síla v podélném směru, pak prodloužení tyče závisí podle Hookova zákona na délce tyče","options":["nepřímo úměrně","přímo úměrně","lineárně","exponenciálně"],"correct":["B","C"]},{"id":"3.68","chapter":3,"chapterName":"Mechanika II","text":"Rovnice kontinuity je speciálním případem:","options":["zákona zachování energie","zákona zachování hmoty","zákona zachování hybnosti","zákona zachování momentu hybnosti"],"correct":["B"]},{"id":"3.69","chapter":3,"chapterName":"Mechanika II","text":"Rovnice kontinuity ve tvaru v1 · S1 = v2 · S2 platí pro:","options":["ideální kapaliny","ideální tekutiny","ideální plyny","nestlačitelné kapaliny, bez ohledu na jejich viskozitu (vnitřní tření)"],"correct":["A","D"]},{"id":"3.70","chapter":3,"chapterName":"Mechanika II","text":"Skalární veličinou je:","options":["tlaková síla","hydrostatický tlak","hybnost","tíha"],"correct":["B"]},{"id":"3.71","chapter":3,"chapterName":"Mechanika II","text":"Těleso o hmotnosti 10 kg se pohybuje stálou rychlostí 36 km/h. Jeho kinetická energie je:","options":["360 J","1000 J","500 J","přibližně 6,5 kJ"],"correct":["C"]},{"id":"3.72","chapter":3,"chapterName":"Mechanika II","text":"Těleso o hmotnosti 2 kg bylo zdviženo do výšky 2 m a odtud padalo volným pádem; kinetická energie, se kterou dopadá těleso na původní místo, je přibližně:","options":["20 J","4 J","40 J","60 J"],"correct":["C"]},{"id":"3.73","chapter":3,"chapterName":"Mechanika II","text":"Těleso padalo ve vakuu pod vlivem gravitačního zrychlení g z nulové počáteční rychlosti po dobu t. Jeho rychlost při dopadu byla:","options":["1/2 · g · t2","g · t","(2t / g)1/2","(2g · t)1/2"],"correct":["B"]},{"id":"3.74","chapter":3,"chapterName":"Mechanika II","text":"Těleso ve vakuu přešlo z klidu do volného pádu a pod vlivem gravitačního zrychlení g padalo po dobu t. Spadlo z výšky:","options":["g · t","1/2 · g · t2","p 2t / g","t / g"],"correct":["B"]},{"id":"3.75","chapter":3,"chapterName":"Mechanika II","text":"Těleso ve vakuu přešlo z klidu do volného pádu a pod vlivem gravitačního zrychlení g padalo z výšky h. Jeho rychlost při dopadu byla:","options":["1/2 · g · t","g · h","(2h / g)1/2","(2g · h)1/2"],"correct":["D"]},{"id":"3.76","chapter":3,"chapterName":"Mechanika II","text":"Těleso ve vakuu přešlo z klidu do volného pádu a pod vlivem gravitačního zrychlení g padalo z výšky h. Spadlo za dobu:","options":["g · h","h / g","(2h / g)1/2","1/2 · g · h"],"correct":["C"]},{"id":"3.77","chapter":3,"chapterName":"Mechanika II","text":"Těleso vložíme celé do kapaliny. Těleso bude stoupat k hladině:","options":["jestliže jeho hustota je větší než hustota kapaliny","je-li tíhová síla působící na těleso větší než vztlaková síla","je-li jeho hmotnost menší než hmotnost kapaliny","jestliže jeho hustota je menší než hustota kapaliny"],"correct":["D"]},{"id":"3.78","chapter":3,"chapterName":"Mechanika II","text":"Tlak 10 N/cm2 lze pomocí jednotky pascal vyjádřit jako:","options":["100 000 Pa","10 000 Pa","107 Pa","10−3 Pa"],"correct":["A"]},{"id":"3.79","chapter":3,"chapterName":"Mechanika II","text":"Tlak v kapalině je:","options":["vektor směru shodného se směrem síly, která ho vyvolala","skalár","vektor kolmý na dno nádoby","vektor opačného směru než je směr síly, která ho vyvolala"],"correct":["B"]},{"id":"3.80","chapter":3,"chapterName":"Mechanika II","text":"Turbulentní proudění má následující vlastnosti:","options":["kapalina netvoří víry","rychlost kapaliny je ve všech místech průřezu stejná","proudnice jsou přibližně rovnoběžné, vrstvy kapaliny se nepromíchávají","kapalina se promíchává, tvoří se v ní víry"],"correct":["D"]},{"id":"3.81","chapter":3,"chapterName":"Mechanika II","text":"V jaké hloubce pod vodní hladinou je hydrostatický tlak přibližně roven normálnímu atmosférickému tlaku?","options":["10 cm","1 m","10 m","100 m"],"correct":["C"]},{"id":"3.82","chapter":3,"chapterName":"Mechanika II","text":"V jakých jednotkách se udává modul pružnosti?","options":["Pa","N · m−1","Pa · m−1","Pa · m"],"correct":["A"]},{"id":"3.83","chapter":3,"chapterName":"Mechanika II","text":"V nádrži s kapalinou závisí hydrostatický tlak v dané hloubce pod hladinou:","options":["na polárních vlastnostech kapaliny","na povrchovém napětí kapaliny","na vnitřním tření kapaliny","na hustotě kapaliny"],"correct":["D"]},{"id":"3.84","chapter":3,"chapterName":"Mechanika II","text":"Ve vakuu vypustíme současně peříčko a těžkou olověnou kuličku ze stejné výšky. Pro uvedené předměty (včetně správného zdůvodnění) platí:","options":["dopadnou současně, nebot’ na oba objekty působí stejná gravitační síla, která jim uděluje stejné zrychlení","dopadnou současně, nebot’ na oba objekty působí sice různě velká gravitační síla, avšak zrychlení, které jim uděluje, je stejné","první dopadne kulička, nebot’ má větší hmotnost, tudíž na ni působí větší gravitační síla","dopadnou současně, nebot’ intenzita gravitačního pole, ve kterém se pohybují, je v obou případech stejná"],"correct":["B","D"]},{"id":"3.85","chapter":3,"chapterName":"Mechanika II","text":"Vektorovou veličinou je:","options":["tlak plynu","hydrostatický tlak","tlak","tlaková síla"],"correct":["D"]},{"id":"3.86","chapter":3,"chapterName":"Mechanika II","text":"Velikost rychlosti, se kterou vytéká reálná kapalina otvorem ve stěně, je v porovnání s ideální kapalinou stejné hustoty:","options":["větší než u ideální kapaliny","menší než u ideální kapaliny","menší nebo větší než u ideální kapaliny v závislosti na teplotě","stejná jako u ideální kapaliny"],"correct":["B"]},{"id":"3.87","chapter":3,"chapterName":"Mechanika II","text":"Velikost vztlakové síly působící na těleso úplně ponořen stanta κ = cp / cv má u plynů hodnotu:","options":["v uzavřeném intervalu ⟨0, 1⟩","v polouzavřeném intervalu (0, 1⟩","vždy větší než 1","vždy menší než 1"],"correct":["C"]},{"id":"5.36","chapter":5,"chapterName":"Termika","text":"Práce vykonaná ideálním plynem při izobarické expanzi při tlaku 0,1 MPa, při které se zvětšil objem ze 7 l na 8 l, má hodnotu:","options":["1 000 J","100 J","75 J","jinou, než výše uvedeno"],"correct":["B"]},{"id":"5.37","chapter":5,"chapterName":"Termika","text":"Pro adiabatický děj v ideálním plynu platí Poissonův zákon, ve kterém se vyskytuje Poissonova konstanta. Rozměr Poissonovy konstanty je:","options":["Pa","J · kg−1 · K−1","J · mol−1 · K−1",""],"correct":["D"]},{"id":"5.38","chapter":5,"chapterName":"Termika","text":"Pro cyklicky pracující tepelný stroj platí:","options":["k zajištění jeho chodu je nutný systém ohřívač – stroj – chladič","k zajištění jeho chodu postačí systém ohřívač – stroj","účinnost ideálního Carnotova stroje závisí pouze na teplotách ohřívače a chladiče","účinnost reálných tepelných strojů je nižší než účinnost Carnotova stroje, protože v nich probíhají nevratné procesy"],"correct":["A","C","D"]},{"id":"5.39","chapter":5,"chapterName":"Termika","text":"Pro děje v ideálním plynu platí:","options":["izochorický děj – změna vnitřní energie plynu je rovna přijatému teplu","adiabatický děj – vnitřní energie plynu se nemění","izobarický děj – přijaté teplo je rovno součtu přírůstku vnitřní energie a mechanické práce, kterou plyn vykoná","izotermický děj – mechanická práce plynu je rovna přijatému teplu"],"correct":["A","C","D"]},{"id":"5.40","chapter":5,"chapterName":"Termika","text":"Pro ideální plyn platí:","options":["je zjednodušeným modelem reálného plynu","je tvořen molekulami, které na sebe působí přitažlivými a odpudivými silami","obsahuje molekuly (částice), jejichž rozměr je oproti vzájemným středním vzdálenostem zanedbatelný","nepodléhá za žádných podmínek fázovým změnám"],"correct":["A","C","D"]},{"id":"5.41","chapter":5,"chapterName":"Termika","text":"Pro práci W vykonanou plynem při stálém tlaku p platí (∆T je změna teploty plynu, ∆V je změna objemu plynu):","options":["W je vždy rovna nule","W = p · ∆T","W = p · ∆V","W = p · ∆T · ∆V"],"correct":["C"]},{"id":"5.42","chapter":5,"chapterName":"Termika","text":"Pro soustavu, která je ve stavu termodynamické rovnováhy (v rovnovážném stavu), platí:","options":["vnitřní energie soustavy se nemění","kinetická energie každé jednotlivé částice je konstantní","teplota soustavy je konstantní","střední kinetická energie částic se rovná nule"],"correct":["A","C"]},{"id":"5.43","chapter":5,"chapterName":"Termika","text":"Pro šíření tepla platí:","options":["nemůže se šířit elektromagnetickým vlněním","může se šířit sdílením (přímým kontaktem těles)","může se šířit prouděním","může se šířit sáláním (vyzařováním)"],"correct":["B","C","D"]},{"id":"5.44","chapter":5,"chapterName":"Termika","text":"Pro teploměry platí:","options":["teploměry slouží k přímému měření množství tepla","ve rtut’ovém teploměru používáme rtut’ v pevném skupenství","rtut’ový teploměr využívá závislost objemu rtuti na teplotě","rtut’ový teploměr nelze používat při tak nízkých teplotách, kdy rtut’ v kapiláře už není v kapalném skupenství"],"correct":["C","D"]},{"id":"5.45","chapter":5,"chapterName":"Termika","text":"Pro vnitřní energii tělesa platí, že:","options":["je dána součtem kinetické a potenciální energie částic tělesa","se může měnit konáním práce","její změna je při adiabatickém ději rovna nule","je pro ideální plyn lineární funkcí absolutní teploty tak, že U(T) = 3/2 N · k · T"],"correct":["A","B","D"]},{"id":"5.46","chapter":5,"chapterName":"Termika","text":"První termodynamický zákon (první termodynamickou větu) lze vyjádřit rovnicí (Q – teplo, m – hmotnost, c – měrná tepelná kapacita, T – termodynamická teplota, U – vnitřní energie, W– práce, p – tlak, V – objem plynu, N – počet molekul, k – Boltzmannova konstanta):","options":["∆Q = m · c · ∆T","∆U = ∆W + ∆Q","p · V = N · k · T","c = ∆Q / ∆T"],"correct":["B"]},{"id":"5.47","chapter":5,"chapterName":"Termika","text":"Při adiabatickém ději:","options":["plyn nekoná práci","plyn může konat práci pouze na úkor své vnitřní energie","vnitřní energie se mění pouze tepelnou výměnou","vždy zůstává konstantní teplota i objem"],"correct":["B"]},{"id":"5.48","chapter":5,"chapterName":"Termika","text":"Při izochorickém ději:","options":["plyn koná práci pouze na úkor své vnitřní energie","se nemění vnitřní energie plynu","plyn nekoná mechanickou práci","nedochází k tepelné výměně"],"correct":["C"]},{"id":"5.49","chapter":5,"chapterName":"Termika","text":"Při izotermickém ději:","options":["nedochází k tepelné výměně","plyn práci nekoná","se nemění teplota","plyn koná práci při současném vzrůstu teploty"],"correct":["C"]},{"id":"5.50","chapter":5,"chapterName":"Termika","text":"Přibližné vyjádření téže teploty ve ◦C a v K (s přesností na celé stupně):","options":["t = −30 ◦C, T ≈ 303 K","t = −243 ◦C, T ≈ 30 K","t = +30 ◦C, T ≈ 243 K","t = −3 ◦C, T ≈ 270 K"],"correct":["B","D"]},{"id":"5.51","chapter":5,"chapterName":"Termika","text":"Přibližné vyjádření téže teploty ve ◦C a v K (s přesností na celé stupně):","options":["t = 10 ◦C, T ≈ 263 K","t = 263 ◦C, T ≈ 10 K","t = 283 ◦C, T ≈ 10 K","t = 10 ◦C, T ≈ 283 K"],"correct":["D"]},{"id":"5.52","chapter":5,"chapterName":"Termika","text":"Přibližné vyjádření téže teploty ve ◦C a v K (s přesností na celé stupně):","options":["t = 50 ◦C, T ≈ 323 K","t = −18 ◦C, T ≈ 247 K","T = 323 K, t ≈ −50 ◦C","t = 0 ◦C, T ≈ 273 K"],"correct":["A","D"]},{"id":"5.53","chapter":5,"chapterName":"Termika","text":"Rovnovážný děj:","options":["je děj, při kterém se nemění stavové veličiny","je děj, při kterém se nemění žádné veličiny","si představujeme jako posloupnost rovnovážných stavů, přičemž stavové veličiny se mění libovolně rychle","je děj, při němž se stavové veličiny mění dostatečně pomalu, takže stav systému můžeme v každém okamžiku pova :"5.61","chapter":5,"chapterName":"Termika","text":"Teplota kapalného dusíku je 77 K, to odpovídá teplotě přibližně:","options":["−4 ◦C","−196 ◦C","350 ◦C","−77 ◦C"],"correct":["B"]},{"id":"5.62","chapter":5,"chapterName":"Termika","text":"Teplota lidského těla je přibližně:","options":["−236 K","236 K","37 K","310 K"],"correct":["D"]},{"id":"5.63","chapter":5,"chapterName":"Termika","text":"Teplota plynu:","options":["je nezávislá na jakékoliv veličině","je mírou střední kinetické energie molekul","je mírou střední potenciální energie molekul","nezávisí na kinetické energii molekul"],"correct":["B"]},{"id":"5.64","chapter":5,"chapterName":"Termika","text":"Teplota plynu:","options":["nezávisí na kinetické energii molekul","roste, jestliže se zvyšuje střední kvadratická rychlost molekul plynu","roste, jestliže se zvyšuje střední kinetická energie molekul plynu","je nezávislá na jakékoliv veličině"],"correct":["B","C"]},{"id":"5.65","chapter":5,"chapterName":"Termika","text":"Teplota termodynamické absolutní nuly je:","options":["teplota trojného bodu vodíku","teplota trojného bodu vody","teplota, při které tuhne tekutý vodík","stav látky, jehož nelze úplně dosáhnout, při němž by ustal tepelný pohyb molekul"],"correct":["D"]},{"id":"5.66","chapter":5,"chapterName":"Termika","text":"Termodynamická stavová veličina:","options":["je souhrnný název pro síly působící na soustavu","popisuje pohyb soustavy, např. rychlost","je veličina, která určuje stav soustavy","je každá fyzikální veličina"],"correct":["C"]},{"id":"5.67","chapter":5,"chapterName":"Termika","text":"Tlak ideálního plynu:","options":["je přímo úměrný druhé mocnině střední kvadratické rychlosti jeho molekul","je nepřímo úměrný druhé mocnině střední kvadratické rychlosti jeho molekul","nezávisí na střední kvadratické rychlosti jeho molekul","je vždy nulový"],"correct":["A"]},{"id":"5.68","chapter":5,"chapterName":"Termika","text":"Účinnost stroje je:","options":["výkon za 1 s","poměr mezi vykonanou prací a do t":["A"]},{"id":"11.81","chapter":11,"chapterName":"Atomová fyzika","text":"V jakých jednotkách se udává Planckova konstanta h?","options":["J · m−1","J","J · s−1","J · s"],"correct":["D"]},{"id":"11.82","chapter":11,"chapterName":"Atomová fyzika","text":"Velikost elektrického proudu, který vzniká při fotoelektrickém jevu, je:","options":["nezávislá na intenzitě dopadajícího záření","úměrná čtvrté mocnině intenzity dopadajícího záření","nepřímo úměrná intenzitě dopadajícího záření","rostoucí s rostoucí intenzitou dopadajícího záření"],"correct":["D"]},{"id":"11.83","chapter":11,"chapterName":"Atomová fyzika","text":"Velikost rychlosti, se kterou vystupují elektrony z látky při fotoelektrickém jevu:","options":["závisí pouze na vlnové délce dopadajícího záření","závisí pouze na materiálu","závisí na materiálu a na vlnové délce dopadajícího záření","závisí pouze na intenzitě dopadajícího záření"],"correct":["C"]},{"id":"11.84","chapter":11,"chapterName":"Atomová fyzika","text":"Vnitřní fotoelektrický jev:","options":["je opačným k vnějšímu fotoelektrickému jevu","způsobuje uvolňování elektronů z atomů, kdy uvolněné elektrony zůstávají v látce a umožňují vznik elektrické vodivosti u původně nevodivých materiálů","spočívá v přijímání volných elektronů do atomů","neumožňuje vznik elektrického proudu"],"correct":["B"]},{"id":"11.85","chapter":11,"chapterName":"Atomová fyzika","text":"Z možných stavů, ve kterých se může nacházet daný atom, nazýváme základním stavem ten stav:","options":["ve kterém atom nereaguje na žádné podněty","ve kterém protony a elektrony v atomu na sebe nepůsobí žádnou silou","který má nejvyšší hodnotu celkové energie atomu","který má nejnižší hodnotu celkové energie atomu"],"correct":["D"]},{"id":"11.86","chapter":11,"chapterName":"Atomová fyzika","text":"Záření alfa je:","options":["tvořeno jádry He","přitahováno k záporně nabité elektrodě","tvořeno proudem elektronů","směsí volně letících protonů a neutronů"],"correct":["A","B"]},{"id":"11.87","chapter":11,"chapterName":"Atomová fyzika","text":"Záření gama:","options":["nemá elektrický náboj","má jednotkový kladný elementární náboj","má jednotkový záporný elementární náboj","je proud fotonů"],"correct":["A","D"]},{"id":"11.88","chapter":11,"chapterName":"Atomová fyzika","text":"Záření β−je tvořeno:","options":["protony","elektrony","fotony","heliovými jádry"],"correct":["B"]},{"id":"11.89","chapter":11,"chapterName":"Atomová fyzika","text":"Záření β−tvoří elektrony vyzařované:","options":["z elektronového obalu atomu","z nejvyšší energetické hladiny elektronového obalu","z jádra atomu (při rozpadu neutronu)","při vnějším fotoelektrickém jevu"],"correct":["C"]},{"id":"11.90","chapter":11,"chapterName":"Atomová fyzika","text":"Záření β−:","options":["jsou elektrony vznikající při procesech v atomovém jádře","se nevychyluje v magnetickém poli","se vychyluje v magnetickém poli","je bez elektrického náboje"],"correct":["A","C"]},{"id":"11.91","chapter":11,"chapterName":"Atomová fyzika","text":"Zdrojem záření gama ve zdravotnictví jsou kobaltové a cesiové zářiče. Atom radioaktivního kobaltu 60 27Co obsahuje:","options":["27 neutronů","60 nukleonů","60 kladných elementárních nábojů","27 protonů"],"correct":["B","D"]}];

const KNOWN_KEY = "fyzika_known_questions_full_v1";
const SETTINGS_KEY = "fyzika_settings_full_v1";

let known = new Set(JSON.parse(localStorage.getItem(KNOWN_KEY) || "[]"));
let settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"testSize":30}');

let mode = "menu";
let active = [];
let index = 0;
let picked = new Set();
let checked = false;
let testAnswers = {};

const app = document.getElementById("app");

function saveKnown() { localStorage.setItem(KNOWN_KEY, JSON.stringify([...known].sort())); }
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
function sameSet(a, b) { return a.size === b.length && b.every(x => a.has(x)); }
function available(chapter = null) { return QUESTIONS.filter(q => !known.has(q.id) && (chapter === null || q.chapter === chapter)); }
function allForChapter(chapter) { return QUESTIONS.filter(q => chapter === null || q.chapter === chapter); }
function letters(arr) { return arr && arr.length ? arr.join(", ") : "nic"; }
function shuffle(a) { const arr=[...a]; for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function chapterRows() {
  const map = new Map();
  for (const q of QUESTIONS) if (!map.has(q.chapter)) map.set(q.chapter, q.chapterName);
  return [...map.entries()].sort((a,b)=>a[0]-b[0]);
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function menu() {
  mode="menu"; checked=false; picked.clear();
  const chapters = chapterRows();
  const totalAvail = available().length;
  app.innerHTML = `
    <div class="card">
      <h1>Fyzika - trenažér</h1>
      <p class="muted">iPad/Safari verze. Obsahuje všech ${QUESTIONS.length} otázek z PDF a klíč správných odpovědí. Otázky označené jako „umím“ se uloží do tohoto zařízení.</p>
      <p>
        <span class="pill">Celkem: ${QUESTIONS.length}</span>
        <span class="pill">Umím: ${known.size}</span>
        <span class="pill">K procvičení: ${totalAvail}</span>
      </p>
    </div>

    <div class="card grid">
      <h2>Vyber režim</h2>
      <label class="muted">Kapitola</label>
      <select id="chapter">
        ${chapters.map(([n,name]) => `<option value="${n}">${n} - ${esc(name)} (${available(n).length}/${allForChapter(n).length})</option>`).join("")}
      </select>
      <button class="primary" onclick="startChapter()">Procvičit kapitolu - kontrola hned</button>
      <div class="row">
        <label class="muted" style="flex: 0 0 auto;">Počet otázek v testu</label>
        <select id="testSize" onchange="settings.testSize=Number(this.value);saveSettings();" style="max-width: 180px;">
          ${[10,20,30,50,100].map(n => `<option value="${n}" ${settings.testSize===n?'selected':''}>${n}</option>`).join("")}
        </select>
      </div>
      <button onclick="startTest()">Random test - kontrola až na konci</button>
      <button onclick="manageKnown()">Správa otázek „umím“</button>
      <button class="danger" onclick="resetKnown()">Vynulovat „umím“</button>
    </div>

    <div class="card">
      <h2>Kapitoly</h2>
      <div class="grid">
        ${chapters.map(([n,name]) => `<div><b>${n}. ${esc(name)}</b><br><span class="muted">${available(n).length} k procvičení / ${allForChapter(n).length} celkem</span></div>`).join("")}
      </div>
    </div>`;
}

function startChapter() {
  const ch = Number(document.getElementById("chapter").value);
  active = available(ch);
  if(!active.length) { alert("V téhle kapitole už nemáš žádné neoznačené otázky."); return; }
  mode="chapter"; index=0; showQuestion();
}

function startTest() {
  const pool = available();
  if(!pool.length) { alert("Nemáš žádné otázky k procvičení."); return; }
  const size = Math.min(settings.testSize || 30, pool.length);
  active = shuffle(pool).slice(0, size);
  mode="test"; index=0; testAnswers={}; showQuestion();
}

function showQuestion() {
  const q = active[index];
  picked = new Set((mode==="test" && testAnswers[q.id]) ? testAnswers[q.id] : []);
  checked=false;
  renderQuestion();
}

function renderQuestion() {
  const q = active[index];
  const selected = sameSet(picked, q.correct);
  const canPrev = index > 0;
  app.innerHTML = `
    <div class="sticky">
      <div class="card between">
        <button onclick="menu()">← Menu</button>
        <span class="pill">${index+1}/${active.length}</span>
        <span class="pill">${esc(q.id)} ${esc(q.chapterName)}</span>
      </div>
    </div>

    <div class="card">
      <h2>${esc(q.text)}</h2>
      <div class="grid">
        ${q.options.map((o,i)=>{
          const L = String.fromCharCode(65+i);
          const cls = [
            "option",
            picked.has(L) ? "selected" : "",
            checked && q.correct.includes(L) ? "correct" : "",
            checked && picked.has(L) && !q.correct.includes(L) ? "wrong" : ""
          ].join(" ");
          return `<button class="${cls}" onclick="toggle('${L}')"><b>${L})</b> ${esc(o)}</button>`;
        }).join("")}
      </div>
      ${checked ? `<p class="${selected ? 'result-ok' : 'result-bad'}">${selected ? 'Správně.' : 'Špatně nebo neúplně. Správně: ' + letters(q.correct)}</p>` : ""}
    </div>

    <div class="card row">
      ${mode==="chapter"
        ? `<button class="primary" onclick="checkNow()">Zkontrolovat</button>
           <button class="good" onclick="markKnown()">Umím - odebrat</button>
           <button onclick="next()">Další</button>`
        : `<button onclick="prev()" ${canPrev ? "" : "disabled"}>Předchozí</button>
           <button onclick="next()">Další</button>
           <button class="primary" onclick="finishTest()">Odevzdat test</button>`}
    </div>
  `;
}

function toggle(L) {
  if(checked && mode==="chapter") return;
  picked.has(L) ? picked.delete(L) : picked.add(L);
  if(mode==="test" && active[index]) testAnswers[active[index].id] = [...picked].sort();
  renderQuestion();
}

function checkNow() {
  checked=true;
  renderQuestion();
}

function markKnown() {
  const q = active[index];
  known.add(q.id);
  saveKnown();
  next();
}

function prev() {
  if(mode==="test" && active[index]) testAnswers[active[index].id] = [...picked].sort();
  if(index > 0) { index--; showQuestion(); }
}

function next() {
  if(mode==="test" && active[index]) testAnswers[active[index].id] = [...picked].sort();
  if(index < active.length-1) { index++; showQuestion(); }
  else {
    if(mode==="test") finishTest();
    else menu();
  }
}

function finishTest() {
  if(active[index]) testAnswers[active[index].id] = [...picked].sort();
  let score=0, wrong=[];
  for(const q of active) {
    const chosen = new Set(testAnswers[q.id] || []);
    if(sameSet(chosen, q.correct)) score++;
    else wrong.push({id:q.id, text:q.text, chosen:[...chosen].sort(), correct:q.correct});
  }
  mode="result";
  app.innerHTML = `
    <div class="card">
      <h1>Výsledek testu</h1>
      <p><span class="pill">Skóre: ${score}/${active.length}</span></p>
      <button class="primary" onclick="menu()">Zpět do menu</button>
    </div>
    ${wrong.length ? `<div class="card"><h2>Chyby</h2>${wrong.map(w => `
      <div class="listItem">
        <b>${esc(w.id)}</b> ${esc(w.text)}<br>
        <span class="result-bad">Tvoje: ${letters(w.chosen)}</span><br>
        <span class="result-ok">Správně: ${letters(w.correct)}</span>
      </div>`).join("")}</div>` : `<div class="card"><h2 class="result-ok">Bez chyby.</h2></div>`}
  `;
}

function manageKnown() {
  const chapters = chapterRows();
  app.innerHTML = `
    <div class="sticky">
      <div class="card between">
        <button onclick="menu()">← Menu</button>
        <h2 style="margin:0;">Správa „umím“</h2>
      </div>
    </div>
    <div class="card grid">
      <p class="muted">Zaškrtnuté otázky se nebudou nabízet v procvičování ani v random testu. Odškrtnutím je vrátíš zpět.</p>
      <input type="search" id="search" placeholder="Hledat otázku nebo ID..." oninput="renderKnownList()" />
      <select id="filterChapter" onchange="renderKnownList()">
        <option value="">Všechny kapitoly</option>
        ${chapters.map(([n,name]) => `<option value="${n}">${n} - ${esc(name)}</option>`).join("")}
      </select>
      <div class="row">
        <button onclick="markVisibleKnown(true)">Označit zobrazené jako umím</button>
        <button onclick="markVisibleKnown(false)">Vrátit zobrazené do procvičování</button>
      </div>
      <div id="knownList"></div>
      <button class="primary" onclick="saveKnownFromManager()">Uložit</button>
    </div>`;
  renderKnownList();
}

function filteredKnownQuestions() {
  const query = (document.getElementById("search")?.value || "").toLowerCase().trim();
  const ch = document.getElementById("filterChapter")?.value || "";
  return QUESTIONS.filter(q => {
    if(ch && q.chapter !== Number(ch)) return false;
    if(!query) return true;
    return q.id.toLowerCase().includes(query) || q.text.toLowerCase().includes(query);
  });
}

function renderKnownList() {
  const list = document.getElementById("knownList");
  const arr = filteredKnownQuestions();
  list.innerHTML = `<p class="muted">Zobrazeno: ${arr.length}</p>` + arr.map(q => `
    <label class="listItem" style="display:block;">
      <input type="checkbox" data-id="${esc(q.id)}" ${known.has(q.id) ? "checked" : ""} />
      <b>${esc(q.id)}</b> ${esc(q.text)}
    </label>`).join("");
}

function markVisibleKnown(value) {
  for (const cb of document.querySelectorAll("#knownList input[data-id]")) cb.checked = value;
}

function saveKnownFromManager() {
  const visibleIds = new Set(filteredKnownQuestions().map(q => q.id));
  const next = new Set([...known].filter(id => !visibleIds.has(id)));
  for (const cb of document.querySelectorAll("#knownList input[data-id]")) {
    if(cb.checked) next.add(cb.dataset.id);
  }
  known = next;
  saveKnown();
  menu();
}

function resetKnown() {
  if(confirm("Opravdu vynulovat všechny otázky označené jako „umím“?")) {
    known = new Set();
    saveKnown();
    menu();
  }
}

menu();
</script>
</body>
</html>
